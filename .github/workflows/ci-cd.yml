name: CI / CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: bash mvnw clean test

  deploy:
    # Deploy only on direct pushes (not PRs)
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest

    # Uses GitHub Environments: dev for dev branch, prod for main branch
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    env:
      # Branch -> Spring profile mapping
      SPRING_PROFILES_ACTIVE: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

      # Dev profile vars (used when SPRING_PROFILES_ACTIVE=dev)
      DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
      DEV_MONGODB_URI: ${{ secrets.DEV_MONGODB_URI }}
      DEV_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
      DEV_SUPABASE_API_KEY: ${{ secrets.DEV_SUPABASE_API_KEY }}
      DEV_SUPABASE_BUCKET: ${{ secrets.DEV_SUPABASE_BUCKET }}
      DEV_S3_ENDPOINT: ${{ secrets.DEV_S3_ENDPOINT }}
      DEV_S3_ACCESS_KEY: ${{ secrets.DEV_S3_ACCESS_KEY }}
      DEV_S3_SECRET_KEY: ${{ secrets.DEV_S3_SECRET_KEY }}

      # Prod profile vars (used when SPRING_PROFILES_ACTIVE=prod)
      PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
      PROD_MONGODB_URI: ${{ secrets.PROD_MONGODB_URI }}
      PROD_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      PROD_SUPABASE_API_KEY: ${{ secrets.PROD_SUPABASE_API_KEY }}
      PROD_SUPABASE_BUCKET: ${{ secrets.PROD_SUPABASE_BUCKET }}
      PROD_S3_ENDPOINT: ${{ secrets.PROD_S3_ENDPOINT }}
      PROD_S3_ACCESS_KEY: ${{ secrets.PROD_S3_ACCESS_KEY }}
      PROD_S3_SECRET_KEY: ${{ secrets.PROD_S3_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build artifact
        run: bash mvnw -DskipTests clean package

      - name: Show selected profile
        run: |
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}"

      # TODO: Replace with your real deploy command (SSH, Docker, Render, Railway, etc.)
      - name: Deploy placeholder
        run: echo "Deploy step not configured yet. Add your platform-specific deployment command here."
